<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640" role="img" aria-label="kick — hand off a live Claude Code session to your own server">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0" stop-color="#0C0F18"/>
      <stop offset="1" stop-color="#0E1422"/>
    </linearGradient>
    <radialGradient id="haze" cx="0.5" cy="0.32" r="0.6">
      <stop offset="0" stop-color="#F4B63E" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#F4B63E" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gA" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#F4B63E" stop-opacity="0.55"/><stop offset="1" stop-color="#F4B63E" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gT" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#4FD1C5" stop-opacity="0.5"/><stop offset="1" stop-color="#4FD1C5" stop-opacity="0"/>
    </radialGradient>
    <style>
      .mono{font-family:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;}
      .sans{font-family:"SF Pro Display","Segoe UI",Inter,Helvetica,Arial,sans-serif;}
    </style>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#haze)"/>
  <rect x="0" y="636" width="1280" height="4" fill="#F4B63E" opacity="0.6"/>

  <!-- wordmark -->
  <g class="sans" text-anchor="middle">
    <text x="624" y="232" font-size="190" font-weight="800" letter-spacing="-6" fill="#E8E3D3">kick</text>
  </g>
  <circle cx="876" cy="198" r="18" fill="#F4B63E"/>

  <g class="sans" text-anchor="middle" fill="#C7CDDA">
    <text x="640" y="300" font-size="30" font-weight="600">Hand off a live Claude&#160;Code session to your own server.</text>
  </g>
  <g class="sans" text-anchor="middle" fill="#8A93A6">
    <text x="640" y="338" font-size="24">Drive it from your phone &#8212; then pull it home.</text>
  </g>

  <!-- journey -->
  <g transform="translate(316,356)">
    <path d="M104 60 H544" stroke="#2A3550" stroke-width="3" stroke-dasharray="3 10" stroke-linecap="round"/>
    <path d="M556 108 Q 324 210 92 108" fill="none" stroke="#243a3f" stroke-width="3" stroke-dasharray="3 10" stroke-linecap="round"/>

    <!-- laptop -->
    <g stroke="#E8E3D3" stroke-width="3" fill="none" stroke-linejoin="round">
      <rect x="14" y="26" width="92" height="58" rx="6"/>
      <path d="M0 92 H120 L109 84 H11 Z" fill="#111626"/>
    </g>
    <text x="60" y="124" text-anchor="middle" class="mono" font-size="17" fill="#7E8AA0">laptop</text>

    <!-- server -->
    <g stroke="#E8E3D3" stroke-width="3" fill="none" stroke-linejoin="round">
      <rect x="292" y="22" width="74" height="78" rx="8" fill="#11192A"/>
      <line x1="292" y1="48" x2="366" y2="48"/><line x1="292" y1="74" x2="366" y2="74"/>
    </g>
    <circle cx="308" cy="35" r="4" fill="#F4B63E"/><circle cx="308" cy="61" r="4" fill="#4FD1C5"/><circle cx="308" cy="87" r="4" fill="#4FD1C5"/>
    <text x="329" y="124" text-anchor="middle" class="mono" font-size="17" fill="#7E8AA0">your server</text>

    <!-- phone -->
    <g stroke="#E8E3D3" stroke-width="3" fill="none" stroke-linejoin="round">
      <rect x="556" y="16" width="52" height="88" rx="12" fill="#11192A"/>
      <line x1="572" y1="30" x2="592" y2="30"/>
      <circle cx="582" cy="92" r="3.4" fill="#E8E3D3" stroke="none"/>
    </g>
    <text x="582" y="124" text-anchor="middle" class="mono" font-size="17" fill="#7E8AA0">phone</text>

    <text x="232" y="18" text-anchor="middle" class="mono" font-size="16" fill="#F4B63E" font-weight="700">kick &#8594;</text>
    <text x="324" y="196" text-anchor="middle" class="mono" font-size="16" fill="#4FD1C5" font-weight="700">&#8592; pull</text>

    <!-- static packets (still card) -->
    <circle cx="300" cy="60" r="17" fill="url(#gA)"/><circle cx="300" cy="60" r="6.5" fill="#F4B63E"/>
    <circle cx="324" cy="170" r="16" fill="url(#gT)"/><circle cx="324" cy="170" r="6" fill="#4FD1C5"/>
  </g>

  <!-- footer pill -->
  <g class="mono" text-anchor="middle">
    <rect x="364" y="588" width="552" height="42" rx="11" fill="#141A28" stroke="#26314A"/>
    <text x="640" y="615" font-size="19" fill="#9AA4B6">Claude&#160;Code plugin&#160;&#160;&#183;&#160;&#160;<tspan fill="#F4B63E">github.com/israelbls/kick</tspan></text>
  </g>
</svg>
