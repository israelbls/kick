<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 384" width="1280" height="384" role="img" aria-label="kick — hand off a live Claude Code session to your own server, drive it from your phone, pull it home">
  <defs>
    <radialGradient id="dGlowA" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#F4B63E" stop-opacity="0.55"/><stop offset="1" stop-color="#F4B63E" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="dGlowT" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#4FD1C5" stop-opacity="0.5"/><stop offset="1" stop-color="#4FD1C5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="dHaze" cx="0.16" cy="0.32" r="0.6">
      <stop offset="0" stop-color="#F4B63E" stop-opacity="0.12"/><stop offset="1" stop-color="#F4B63E" stop-opacity="0"/>
    </radialGradient>
    <style>
      .mono{font-family:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;}
      .sans{font-family:"SF Pro Display","Segoe UI",Inter,Helvetica,Arial,sans-serif;}
    </style>
  </defs>

  <!-- transparent background; just a soft warm haze behind the wordmark -->
  <ellipse cx="240" cy="150" rx="420" ry="220" fill="url(#dHaze)"/>

  <!-- wordmark -->
  <g class="sans">
    <text x="72" y="176" font-size="138" font-weight="800" letter-spacing="-4" fill="#ECE7D8">kick</text>
    <circle cx="398" cy="158" r="13" fill="#F4B63E">
      <animate attributeName="r" values="13;16;13" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.6;1" dur="2.4s" repeatCount="indefinite"/>
    </circle>
  </g>
  <g class="sans" fill="#A6B0C2" font-size="18">
    <text x="78" y="222">Hand off a live Claude&#160;Code session to your own server.</text>
    <text x="78" y="247">Drive it from your phone &#8212; then pull it home.</text>
  </g>

  <!-- prompt pill -->
  <rect x="78" y="276" width="252" height="46" rx="11" fill="#161B26" stroke="#33405C"/>
  <text x="100" y="305" class="mono" font-size="20" fill="#5BD6CB">$ <tspan fill="#F4B63E" font-weight="700">/kick</tspan></text>
  <rect x="206" y="289" width="11" height="20" fill="#ECE7D8">
    <animate attributeName="opacity" values="1;1;0;0" dur="1.1s" repeatCount="indefinite"/>
  </rect>

  <!-- journey -->
  <path d="M700 176 H1112" stroke="#46546F" stroke-width="2.5" stroke-dasharray="3 9" stroke-linecap="round"/>
  <path d="M1120 224 Q 902 330 668 224" fill="none" stroke="#3A565B" stroke-width="2.5" stroke-dasharray="3 9" stroke-linecap="round"/>

  <g stroke="#ECE7D8" stroke-width="2.5" fill="none" stroke-linejoin="round">
    <rect x="612" y="146" width="78" height="50" rx="5"/>
    <path d="M600 204 H702 L692 196 H610 Z" fill="#1A2233"/>
  </g>
  <text x="651" y="232" text-anchor="middle" class="mono" font-size="14" fill="#8C97AD">laptop</text>

  <g stroke="#ECE7D8" stroke-width="2.5" fill="none" stroke-linejoin="round">
    <rect x="872" y="142" width="64" height="68" rx="7" fill="#1A2233"/>
    <line x1="872" y1="165" x2="936" y2="165"/><line x1="872" y1="188" x2="936" y2="188"/>
  </g>
  <circle cx="886" cy="153" r="3.4" fill="#F4B63E"/><circle cx="886" cy="176" r="3.4" fill="#4FD1C5"/><circle cx="886" cy="199" r="3.4" fill="#4FD1C5"/>
  <text x="904" y="232" text-anchor="middle" class="mono" font-size="14" fill="#8C97AD">your server</text>

  <g stroke="#ECE7D8" stroke-width="2.5" fill="none" stroke-linejoin="round">
    <rect x="1134" y="138" width="46" height="76" rx="11" fill="#1A2233"/>
    <line x1="1148" y1="150" x2="1166" y2="150"/>
    <circle cx="1157" cy="202" r="3" fill="#ECE7D8" stroke="none"/>
  </g>
  <text x="1157" y="232" text-anchor="middle" class="mono" font-size="14" fill="#8C97AD">phone</text>

  <text x="792" y="138" text-anchor="middle" class="mono" font-size="14" fill="#F4B63E" font-weight="700">kick &#8594;</text>
  <text x="894" y="318" text-anchor="middle" class="mono" font-size="14" fill="#4FD1C5" font-weight="700">&#8592; pull</text>

  <g>
    <circle r="16" fill="url(#dGlowA)"><animateMotion dur="3.2s" repeatCount="indefinite" path="M700 176 H1112" calcMode="spline" keyPoints="0;1" keyTimes="0;1" keySplines="0.5 0 0.5 1"/><animate attributeName="opacity" values="0;1;1;1;0" keyTimes="0;0.08;0.5;0.92;1" dur="3.2s" repeatCount="indefinite"/></circle>
    <circle r="6" fill="#F4B63E"><animateMotion dur="3.2s" repeatCount="indefinite" path="M700 176 H1112" calcMode="spline" keyPoints="0;1" keyTimes="0;1" keySplines="0.5 0 0.5 1"/><animate attributeName="opacity" values="0;1;1;1;0" keyTimes="0;0.08;0.5;0.92;1" dur="3.2s" repeatCount="indefinite"/></circle>
  </g>
  <g>
    <circle r="15" fill="url(#dGlowT)"><animateMotion dur="3.2s" begin="1.6s" repeatCount="indefinite" path="M1120 224 Q 902 330 668 224" calcMode="spline" keyPoints="0;1" keyTimes="0;1" keySplines="0.5 0 0.5 1"/><animate attributeName="opacity" values="0;1;1;1;0" keyTimes="0;0.08;0.5;0.92;1" dur="3.2s" begin="1.6s" repeatCount="indefinite"/></circle>
    <circle r="5.5" fill="#4FD1C5"><animateMotion dur="3.2s" begin="1.6s" repeatCount="indefinite" path="M1120 224 Q 902 330 668 224" calcMode="spline" keyPoints="0;1" keyTimes="0;1" keySplines="0.5 0 0.5 1"/><animate attributeName="opacity" values="0;1;1;1;0" keyTimes="0;0.08;0.5;0.92;1" dur="3.2s" begin="1.6s" repeatCount="indefinite"/></circle>
  </g>
</svg>
