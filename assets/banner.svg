<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 384" width="1280" height="384" role="img" aria-label="kick — hand off a live Claude Code session to your own server, drive it from your phone, pull it home">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0C0F18"/>
      <stop offset="1" stop-color="#0E1422"/>
    </linearGradient>
    <radialGradient id="glowAmber" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#F4B63E" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#F4B63E" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowTeal" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#4FD1C5" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#4FD1C5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="haze" cx="0.18" cy="0.2" r="0.7">
      <stop offset="0" stop-color="#F4B63E" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#F4B63E" stop-opacity="0"/>
    </radialGradient>
    <style>
      .mono { font-family: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace; }
      .sans { font-family: "SF Pro Display", "Segoe UI", Inter, Helvetica, Arial, sans-serif; }
    </style>
  </defs>

  <!-- ground -->
  <rect width="1280" height="384" fill="url(#bg)"/>
  <rect width="1280" height="384" fill="url(#haze)"/>
  <!-- faint baseline rule -->
  <rect x="0" y="383" width="1280" height="1" fill="#F4B63E" opacity="0.25"/>

  <!-- ===================== left: wordmark ===================== -->
  <g class="sans">
    <text x="72" y="176" font-size="138" font-weight="800" letter-spacing="-4" fill="#E8E3D3">kick</text>
    <!-- pulsing accent punch after the word -->
    <circle cx="398" cy="158" r="13" fill="#F4B63E">
      <animate attributeName="r" values="13;16;13" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.6;1" dur="2.4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g class="sans" fill="#9AA4B6" font-size="18">
    <text x="78" y="222">Hand off a live Claude&#160;Code session to your own server.</text>
    <text x="78" y="247">Drive it from your phone &#8212; then pull it home.</text>
  </g>

  <!-- prompt pill -->
  <g>
    <rect x="78" y="276" width="252" height="46" rx="11" fill="#141A28" stroke="#26314A"/>
    <text x="100" y="305" class="mono" font-size="20" fill="#4FD1C5">$ <tspan fill="#F4B63E" font-weight="700">/kick</tspan></text>
    <rect x="206" y="289" width="11" height="20" fill="#E8E3D3">
      <animate attributeName="opacity" values="1;1;0;0" dur="1.1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- ===================== right: the journey ===================== -->
  <g transform="translate(0,0)">
    <!-- top travel path (kick + drive): laptop -> server -> phone -->
    <path d="M700 176 H1112" stroke="#2A3550" stroke-width="2.5" stroke-dasharray="3 9" stroke-linecap="round"/>
    <!-- return arc (pull): phone -> laptop -->
    <path d="M1120 224 Q 902 330 668 224" fill="none" stroke="#243a3f" stroke-width="2.5" stroke-dasharray="3 9" stroke-linecap="round"/>

    <!-- node: laptop -->
    <g stroke="#E8E3D3" stroke-width="2.5" fill="none" stroke-linejoin="round">
      <rect x="612" y="146" width="78" height="50" rx="5"/>
      <path d="M600 204 H702 L692 196 H610 Z" fill="#111626"/>
    </g>
    <text x="651" y="232" text-anchor="middle" class="mono" font-size="14" fill="#7E8AA0">laptop</text>

    <!-- node: your server (the hub) -->
    <g stroke="#E8E3D3" stroke-width="2.5" fill="none" stroke-linejoin="round">
      <rect x="872" y="142" width="64" height="68" rx="7" fill="#11192A"/>
      <line x1="872" y1="165" x2="936" y2="165"/>
      <line x1="872" y1="188" x2="936" y2="188"/>
    </g>
    <circle cx="886" cy="153" r="3.4" fill="#F4B63E"/>
    <circle cx="886" cy="176" r="3.4" fill="#4FD1C5"/>
    <circle cx="886" cy="199" r="3.4" fill="#4FD1C5"/>
    <text x="904" y="232" text-anchor="middle" class="mono" font-size="14" fill="#7E8AA0">your server</text>

    <!-- node: phone -->
    <g stroke="#E8E3D3" stroke-width="2.5" fill="none" stroke-linejoin="round">
      <rect x="1134" y="138" width="46" height="76" rx="11" fill="#11192A"/>
      <line x1="1148" y1="150" x2="1166" y2="150"/>
      <circle cx="1157" cy="202" r="3" fill="#E8E3D3" stroke="none"/>
    </g>
    <text x="1157" y="232" text-anchor="middle" class="mono" font-size="14" fill="#7E8AA0">phone</text>

    <!-- labels -->
    <text x="792" y="138" text-anchor="middle" class="mono" font-size="14" fill="#F4B63E" font-weight="700">kick &#8594;</text>
    <text x="894" y="318" text-anchor="middle" class="mono" font-size="14" fill="#4FD1C5" font-weight="700">&#8592; pull</text>

    <!-- amber session packet: laptop -> phone -->
    <g>
      <circle r="16" fill="url(#glowAmber)">
        <animateMotion dur="3.2s" repeatCount="indefinite" path="M700 176 H1112" keyPoints="0;1" keyTimes="0;1" calcMode="spline" keySplines="0.5 0 0.5 1"/>
        <animate attributeName="opacity" values="0;1;1;1;0" keyTimes="0;0.08;0.5;0.92;1" dur="3.2s" repeatCount="indefinite"/>
      </circle>
      <circle r="6" fill="#F4B63E">
        <animateMotion dur="3.2s" repeatCount="indefinite" path="M700 176 H1112" keyPoints="0;1" keyTimes="0;1" calcMode="spline" keySplines="0.5 0 0.5 1"/>
        <animate attributeName="opacity" values="0;1;1;1;0" keyTimes="0;0.08;0.5;0.92;1" dur="3.2s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- teal pull packet: phone -> laptop (offset) -->
    <g>
      <circle r="15" fill="url(#glowTeal)">
        <animateMotion dur="3.2s" begin="1.6s" repeatCount="indefinite" path="M1120 224 Q 902 330 668 224" calcMode="spline" keySplines="0.5 0 0.5 1" keyPoints="0;1" keyTimes="0;1"/>
        <animate attributeName="opacity" values="0;1;1;1;0" keyTimes="0;0.08;0.5;0.92;1" dur="3.2s" begin="1.6s" repeatCount="indefinite"/>
      </circle>
      <circle r="5.5" fill="#4FD1C5">
        <animateMotion dur="3.2s" begin="1.6s" repeatCount="indefinite" path="M1120 224 Q 902 330 668 224" calcMode="spline" keySplines="0.5 0 0.5 1" keyPoints="0;1" keyTimes="0;1"/>
        <animate attributeName="opacity" values="0;1;1;1;0" keyTimes="0;0.08;0.5;0.92;1" dur="3.2s" begin="1.6s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>
</svg>
